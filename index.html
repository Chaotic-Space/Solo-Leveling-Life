const buildWeeklyDungeon=(weekStart,dungeonName)=>{const ranks=["E","D","C","B","S"];const quests=ranks.map(r=>{const pool=WORKOUT_QUESTS.filter(q=>q.rank===r);return pool[Math.floor(Math.random()*pool.length)];});return{weekStart,dungeonName,quests,completedSteps:[],cleared:false,rewardClaimed:false};};

/* ═══════════════════ SOUND ENGINE ═══════════════════ */
const SoundEngine = {
  ctx:null, enabled:true,
  init(){ if(!this.ctx) try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch{} },
  tone(freq,dur,type,vol){
    if(!this.enabled||!this.ctx)return;
    try{if(this.ctx.state==='suspended')this.ctx.resume();}catch{}
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||0.15;
    o.connect(g);g.connect(this.ctx.destination);
    const t=this.ctx.currentTime;g.gain.setValueAtTime(vol||0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur);
  },

/* ═══════════════════ QUEST STATUS LOGIC ═══════════════════ */
function getQuestStatus(q, h, completed, failed) {
  if (completed.includes(q.id)) return "completed";
  if (failed.includes(q.id)) return "failed";
  if (h < q.from) return "upcoming";
  if (h >= q.until) return "expired";
  return "active";
}

function getTimeLabel(q, h) {
  if (h < q.from) return `Unlocks at ${fmtH(q.from)}`;
  if (h >= q.until) return "Expired";
  const left = q.until - h;
  if (left <= 1) return "Expires soon!";
  if (left <= 2) return `${left}h left`;
  return `Until ${fmtH(q.until)}`;
}

function fmtH(h) {
  if (h === 0 || h === 24) return "12 AM";
  if (h === 12) return "12 PM";
  return h < 12 ? `${h} AM` : `${h-12} PM`;
}

function getUrgencyColor(q, h) {
  const left = q.until - h;
  if (left <= 1) return "#ef4444";
  if (left <= 2) return "#f59e0b";
  return "#64748b";
}

function pickRandomQuest(state) {
  const h = NOW_H();
  const failCount = (state.failedToday||[]).length;
  const recent = state.recentRandomQuests || [];

  // Compute neglected stat from last 3 days of statHistory
  const sh = state.statHistory || {};
  const today = TDK();
  const recent3 = Object.entries(sh).filter(([d])=>d<today).sort(([a],[b])=>b.localeCompare(a)).slice(0,3);
  const statTotals = {STR:0,VIT:0,AGI:0,INT:0,CHA:0};
  recent3.forEach(([,day])=>SN.forEach(s=>{statTotals[s]+=(day[s]||0);}));
  const neglected = Object.entries(statTotals).sort((a,b)=>a[1]-b[1])[0][0];
  const weak = Object.entries(state.stats).sort((a,b)=>a[1]-b[1])[0][0];

  // Determine time bucket
  let tk;
  if(failCount>2 && Math.random()<0.4) { tk="recovery"; }
  else if(h<9) { tk="morning"; }
  else if(h<13) { tk="midday"; }
  else if(h<18) { tk="afternoon"; }
  else if(h<22) { tk="evening"; }
  else { tk="night"; }

  // Dynamic challenge chance based on streak
  const chalChance = state.streak>7 ? 0.45 : state.streak>4 ? 0.30 : 0.20;
  if(tk!=="recovery" && state.level>=3 && Math.random()<chalChance) tk="challenge";

  // Filter out recently seen quests; if all exhausted, reset for this bucket
  let pool = (RAND_POOL[tk]||RAND_POOL.morning).filter(q=>!recent.includes(q.name));
  if(pool.length===0) pool = RAND_POOL[tk]||RAND_POOL.morning;

  // Boost stat targeting if a stat has been neglected 2+ of last 3 days
  const neglectDays = recent3.filter(([,d])=>!d[neglected]||d[neglected]===0).length;
  const targetChance = neglectDays>=2 ? 0.55 : 0.30;

  const pick = pool[Math.floor(Math.random()*pool.length)];
  const targetStat = Math.random()<targetChance ? neglected : (Math.random()<0.3 ? weak : pick.stat);
  return {
    ...pick,
    stat: targetStat,
    xp: Math.round(pick.xp * (1 + state.level*0.03)),
    id: `rq_${Date.now()}`,
    isRandom: true,
  };
}

async function generateAIQuest(state) {
  const provider = localStorage.getItem("sl_ai_provider")||"gemini";
  const apiKey = localStorage.getItem(`sl_api_key_${provider}`)||"";
  if(!apiKey) return pickRandomQuest(state);

  const h = NOW_H();
  const tc = h<6?"late night":h<9?"early morning":h<12?"morning":h<14?"midday":h<17?"afternoon":h<20?"evening":"night";
  const top = Object.entries(state.stats).sort((a,b)=>b[1]-a[1])[0];
  const weak = Object.entries(state.stats).sort((a,b)=>a[1]-b[1])[0];
  const failCount = (state.failedToday||[]).length;
  const recentNames = (state.recentRandomQuests||[]).slice(-10);

  const prompt = `You are the System from Solo Leveling. Generate a quest:
Level ${state.level}, Title: ${state.title}. STR:${state.stats.STR} VIT:${state.stats.VIT} AGI:${state.stats.AGI} INT:${state.stats.INT} CHA:${state.stats.CHA}. Strongest:${top[0]}, Weakest:${weak[0]}. Time:${tc}. Done today:${state.completedToday.length}. Failed today:${failCount}. Streak:${state.streak}.
${failCount>2?"Hunter is struggling today. Give an easier motivational quest.":""}
${state.streak>5?"Hunter has a strong streak. Give a worthy challenge.":""}
${recentNames.length>0?`Do not repeat these recent quests: ${recentNames.join(", ")}.`:""}
Quest must be completable today. Consider time of day. XP 10-80. Target weak stat sometimes.
Respond ONLY JSON: {"name":"max 25 chars","desc":"max 50 chars","xp":number,"stat":"STR|VIT|AGI|INT|CHA","icon":"emoji","flavor":"system msg max 80 chars"}`;

  try {
    let text;
    if(provider==="anthropic") {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:250,messages:[{role:"user",content:prompt}]}),
      });
      if(!res.ok) throw new Error();
      const d = await res.json();
      text = d.content?.filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    } else if(provider==="openai") {
      const res = await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
        body:JSON.stringify({model:"gpt-4o-mini",max_tokens:250,messages:[{role:"user",content:prompt}]}),
      });
      if(!res.ok) throw new Error();
      const d = await res.json();
      text = d.choices?.[0]?.message?.content?.trim();
    } else {
      // Google Gemini (default, free tier)
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${apiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:250}}),
      });
      if(!res.ok) throw new Error();
      const d = await res.json();
      text = d.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
    }
    const q = JSON.parse(text.replace(/```json\s*|```\s*/g,"").trim());
    return { id:`rq_${Date.now()}`, name:String(q.name).slice(0,30), desc:String(q.desc||"").slice(0,60), xp:Math.min(Math.max(+q.xp||15,5),120), stat:SN.includes(q.stat)?q.stat:"STR", icon:q.icon||"🎲", flavor:String(q.flavor||"").slice(0,100), isRandom:true };
  } catch { return pickRandomQuest(state); }
}

function swNotif(title, body, tag) {
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const opts={body,tag,renotify:true,vibrate:[200,100,200],icon:'./icons/icon-192.png',badge:'./icons/icon-192.png'};
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification(title,opts);
    }).catch(()=>{ try{new Notification(title,{body,tag});}catch{} });
  } else { try{new Notification(title,{body,tag});}catch{} }
}

  const [showShareCard,setShowShareCard] = useState(false);
  const [showAddTimer,setShowAddTimer] = useState(false);
  const [showTitleSelect,setShowTitleSelect] = useState(false);
  const tRef = useRef(null);
  const tiRefs = useRef({});
  const pomRef = useRef(null);

  // Load
  useEffect(()=>{
    (async()=>{
      try {
        const raw = localStorage.getItem("sl-v7");
        if (raw) {
          const s = JSON.parse(raw);
          if (s.todayDate !== TDK()) {
            const d = Math.floor((Date.now()-new Date(s.todayDate).getTime())/864e5);
            s.streak = d<=1 ? s.streak+1 : 0;
            s.completedToday=[]; s.failedToday=[]; s.todayDate=TDK();
            s.timerCompletionsToday=0; s.questsSinceLastRandom=0; s.randomQuestsToday=0; s.lastFailCheck=0;
            s.summonUsedToday=false; s.dailyBoss=null; s.penaltyQuests=[];
            if(s.pomodoro)s.pomodoro={...s.pomodoro,active:false,seconds:0,total:0};
            s.hp=Math.min(s.hp+20,s.maxHp); s.mp=Math.min(s.mp+10,s.maxMp);
          }
          if(!s.timerSettings)s.timerSettings=TIMER_DEFAULTS;
          if(!s.customQuests)s.customQuests=[];
          if(!s.failedToday)s.failedToday=[];
          if(!s.recentRandomQuests)s.recentRandomQuests=[];
          if(!s.statHistory)s.statHistory={};
          if(!s.questFreqMode)s.questFreqMode="normal";
          if(s.summonUsedToday===undefined)s.summonUsedToday=false;
          if(!s.achievements)s.achievements=[];
          if(!s.achievementCtx)s.achievementCtx={randomAccepted:0};
          if(!s.dailyLog)s.dailyLog={};
          if(!s.comboTracker)s.comboTracker={count:0,lastTime:0};
          if(s.soundEnabled===undefined)s.soundEnabled=true;
          if(s.dailyBoss===undefined)s.dailyBoss=null;
          if(!s.bossesDefeated)s.bossesDefeated=0;
          if(!s.chainProgress)s.chainProgress={};
          if(!s.shadowArmy)s.shadowArmy=[];
          if(!s.lastPassiveXpTime)s.lastPassiveXpTime=0;
          if(!s.equipment)s.equipment={weapon:null,armor:null,accessory:null};
          if(!s.unlockedItems)s.unlockedItems=[];
          if(s.weeklyDungeon===undefined)s.weeklyDungeon=null;
          if(!s.earnedTitles)s.earnedTitles=["t_beginner"];
          if(s.activeTitle===undefined)s.activeTitle=null;
          if(!s.pomodoro)s.pomodoro={active:false,seconds:0,total:0,completed:0};
          if(!s.penaltyQuests)s.penaltyQuests=[];
          if(!s.records)s.records={bestStreak:0,bestWeekXp:0,bestDayQuests:0,totalQuestsCompleted:0,totalWorkouts:0};
          if('Notification' in window && s.notificationsEnabled && Notification.permission!=='granted') s.notificationsEnabled=false;
          SoundEngine.enabled=s.soundEnabled!==false;
          setState(s);
        } else {
          setState({...DEFAULT_STATE,todayDate:TDK()});
        }
      } catch { setState({...DEFAULT_STATE,todayDate:TDK()}); }
      setLoading(false);
    })();
  },[]);

  // Save
  useEffect(()=>{
    if(state&&!loading) localStorage.setItem("sl-v7",JSON.stringify(state));
  },[state,loading]);

  // Clock tick — check for expired quests every minute
  useEffect(()=>{
    const iv = setInterval(()=>{
      setHour(NOW_H());
    }, 30000); // every 30s
    return ()=>clearInterval(iv);
  },[]);

  // Auto-fail expired quests
  useEffect(()=>{
    if(!state||loading) return;
    const h = NOW_H();
    if(h === state.lastFailCheck) return;
    let hpLoss = 0;
    const newFailed = [];
    DAILY_QUESTS.forEach(q=>{
      if(h >= q.until && !state.completedToday.includes(q.id) && !state.failedToday.includes(q.id) && q.failPenalty > 0) {
        newFailed.push(q.id);
        hpLoss += q.failPenalty;
      }
    });
    if(newFailed.length > 0) {
      setState(p=>({
        ...p,
        failedToday: [...p.failedToday, ...newFailed],
        hp: Math.max(p.hp - hpLoss, 1),
        lastFailCheck: h,
      }));
      setFailToast(`${newFailed.length} quest${newFailed.length>1?"s":""} expired! -${hpLoss} HP`);
      setTimeout(()=>setFailToast(null), 3000);
    } else {
      setState(p=>({...p, lastFailCheck:h}));
    }
  },[hour, state?.completedToday, state?.failedToday, loading]);

  // Timer intervals
  useEffect(()=>{
    if(!state||loading) return;
    Object.values(tiRefs.current).forEach(clearInterval);
    tiRefs.current={};
    const enabled = state.timerSettings.filter(t=>t.enabled);
    enabled.forEach(t=>{
      tiRefs.current[t.id]=setInterval(()=>{
        swNotif(`⚔️ ${t.name}`,`${t.desc} · +${t.xp} XP`,t.id);
        setTimerPop({...t});
      }, t.intervalMin*60*1000);
    });
    // Schedule background notifications via service worker
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(reg=>{
        if(reg.active) reg.active.postMessage({
          type:'SCHEDULE_TIMERS',
          timers: enabled.map(t=>({id:t.id,name:t.name,desc:t.desc,xp:t.xp,intervalMs:t.intervalMin*60*1000}))
        });
      }).catch(()=>{});
    }
    return ()=>Object.values(tiRefs.current).forEach(clearInterval);
  },[state?.timerSettings,loading]);

  // Daily boss reset
  useEffect(()=>{
    if(!state||loading) return;
    const today=TDK();
    if(!state.dailyBoss || state.dailyBoss.date!==today) {
      const boss=BOSS_POOL[Math.floor(Math.random()*BOSS_POOL.length)];
      setState(p=>({...p,dailyBoss:{...boss,date:today,defeated:false}}));
    }
  },[state?.todayDate,loading]);

  // Weekly dungeon reset
  useEffect(()=>{
    if(!state||loading) return;
    const ws=getWeekStart();
    if(!state.weeklyDungeon || state.weeklyDungeon.weekStart!==ws) {
      const name=WEEKLY_DUNGEON_NAMES[Math.floor(Math.random()*WEEKLY_DUNGEON_NAMES.length)];
      setState(p=>({...p,weeklyDungeon:buildWeeklyDungeon(ws,name)}));
    }
  },[state?.todayDate,loading]);

  // Shadow unlock check
  useEffect(()=>{
    if(!state||loading) return;
    const newUnlocks=SHADOWS.filter(sh=>
      !state.shadowArmy.includes(sh.id) &&
      state.level>=sh.reqLevel &&
      state.streak>=sh.reqStreak
    ).map(sh=>sh.id);
    if(newUnlocks.length>0) setState(p=>({...p,shadowArmy:[...p.shadowArmy,...newUnlocks]}));
  },[state?.level,state?.streak,loading]);

  // Equipment unlock check
  useEffect(()=>{
    if(!state||loading) return;
    const newItems=EQUIPMENT_ITEMS.filter(item=>!state.unlockedItems.includes(item.id)&&state.level>=item.reqLevel).map(i=>i.id);
    if(newItems.length>0) setState(p=>({...p,unlockedItems:[...p.unlockedItems,...newItems]}));
  },[state?.level,loading]);

  // Shadow passive XP (every 60s)
  useEffect(()=>{
    if(!state||loading||state.shadowArmy.length===0) return;
    const iv=setInterval(()=>{
      const now=Date.now();
      setState(p=>{
        const hoursElapsed=(now-(p.lastPassiveXpTime||now))/3600000;
        if(hoursElapsed<0.01) return {...p,lastPassiveXpTime:now};
        let n={...p,lastPassiveXpTime:now};
        (p.shadowArmy||[]).forEach(sid=>{
          const sh=SHADOWS.find(s=>s.id===sid);
          if(!sh) return;
          const xp=Math.round(sh.xpPerHr*hoursElapsed);
          if(xp>0) n=apXp(n,xp,sh.stat,false);
        });
        return n;
      });
    },60000);
    return ()=>clearInterval(iv);
  },[state?.shadowArmy,loading]);

  // Pomodoro countdown
  useEffect(()=>{
    if(!state||loading) return;
    if(state.pomodoro?.active) {
      pomRef.current=setInterval(()=>{
        setState(p=>{
          if(!p.pomodoro?.active) return p;
          const secs=p.pomodoro.seconds-1;
          if(secs<=0) {
            clearInterval(pomRef.current);
            const cfg=POMODORO_OPTS.find(o=>o.min===Math.round(p.pomodoro.total/60))||POMODORO_OPTS[0];
            const n=apXp({...p},cfg.xp,"INT",false);
            swNotif("🍅 Focus Complete!",`+${cfg.xp} XP earned!`,"pom");
            return {...n,pomodoro:{...p.pomodoro,active:false,seconds:0,completed:(p.pomodoro.completed||0)+1}};
          }
          return {...p,pomodoro:{...p.pomodoro,seconds:secs}};
        });
      },1000);
    } else {
      if(pomRef.current) { clearInterval(pomRef.current); pomRef.current=null; }
    }
    return ()=>{ if(pomRef.current){clearInterval(pomRef.current);pomRef.current=null;} };
  },[state?.pomodoro?.active,loading]);

  // Penalty quest refresh based on HP
  useEffect(()=>{
    if(!state||loading) return;
    const hpPct=state.hp/state.maxHp;
    if(hpPct<0.5 && (state.penaltyQuests||[]).length===0) {
      const shuffled=[...PENALTY_QUEST_POOL].sort(()=>Math.random()-.5).slice(0,3);
      setState(p=>({...p,penaltyQuests:shuffled}));
    } else if(hpPct>=0.5 && (state.penaltyQuests||[]).length>0) {
      setState(p=>({...p,penaltyQuests:[]}));
    }
  },[state?.hp,loading]);

  // Records + Titles update
  useEffect(()=>{
    if(!state||loading) return;
    const dl=state.dailyLog||{};
    const today=TDK();
    const weekXp=Object.entries(dl).filter(([d])=>d>=getWeekStart()).reduce((a,[,v])=>a+(v.xpGained||0),0);
    const todayQuests=(dl[today]?.completed||0);
    const rec=state.records||{};
    const newRec={
      bestStreak:Math.max(rec.bestStreak||0,state.streak),
      bestWeekXp:Math.max(rec.bestWeekXp||0,weekXp),
      bestDayQuests:Math.max(rec.bestDayQuests||0,todayQuests),
      totalQuestsCompleted:rec.totalQuestsCompleted||0,
      totalWorkouts:rec.totalWorkouts||0,
    };
    const newTitles=TITLE_POOL.filter(t=>!(state.earnedTitles||[]).includes(t.id)&&t.check(state)).map(t=>t.id);
    if(JSON.stringify(newRec)!==JSON.stringify(rec)||newTitles.length>0) {
      setState(p=>({...p,records:newRec,earnedTitles:[...(p.earnedTitles||[]),...newTitles]}));
    }
  },[state?.totalXp,state?.streak,state?.completedToday?.length,loading]);

  // Random quest on open
  useEffect(()=>{
    if(!state||loading) return;
    if((state.randomQuestsToday||0)===0 && Math.random()<0.35) {
      const tm=setTimeout(async()=>{setRandomPop(await generateAIQuest(state));},2500);
      return ()=>clearTimeout(tm);
    }
  },[loading]);

  const showT=useCallback((m,t="xp")=>{if(tRef.current)clearTimeout(tRef.current);setToast({m,t});tRef.current=setTimeout(()=>setToast(null),2200);},[]);

  const apXp=useCallback((p,xp,st,isCrit)=>{
    // Streak multiplier
    const streakMult=p.streak>=10?1.5:p.streak>=5?1.2:1.0;
    const finalXp=Math.round(xp*streakMult*(isCrit?2:1));
    const n={...p,xp:p.xp+finalXp,totalXp:p.totalXp+finalXp,stats:{...p.stats,[st]:p.stats[st]+1}};
    // Stat history
    const td=TDK();const sh={...(p.statHistory||{})};
    if(!sh[td])sh[td]={STR:0,VIT:0,AGI:0,INT:0,CHA:0};
    sh[td]={...sh[td],[st]:(sh[td][st]||0)+1};
    const cutoff=new Date(Date.now()-7*864e5).toISOString().split("T")[0];
    Object.keys(sh).forEach(d=>{if(d<cutoff)delete sh[d];});
    n.statHistory=sh;
    // Daily log
    const dl={...(p.dailyLog||{})};
    if(!dl[td])dl[td]={completed:0,failed:0,xpGained:0,statGains:{STR:0,VIT:0,AGI:0,INT:0,CHA:0}};
    dl[td]={...dl[td],xpGained:(dl[td].xpGained||0)+finalXp,statGains:{...dl[td].statGains,[st]:(dl[td].statGains[st]||0)+1}};
    const cutoff30=new Date(Date.now()-30*864e5).toISOString().split("T")[0];
    Object.keys(dl).forEach(d=>{if(d<cutoff30)delete dl[d];});
    n.dailyLog=dl;
    // Level up
    let nl=p.level,nx=n.xp,pts=p.statPoints,did=false;
    while(nl<LEVEL_XP.length-1&&nx>=LEVEL_XP[nl]){nx-=LEVEL_XP[nl];nl++;pts+=3;did=true;}
    n.level=nl;n.xp=nx;n.statPoints=pts;n.title=getTitle(nl);
    n.maxHp=100+(nl-1)*15+(n.stats.VIT-1)*5;n.hp=Math.min(p.hp+5,n.maxHp);
    n.maxMp=50+(nl-1)*8+(n.stats.INT-1)*3;n.mp=Math.min(p.mp+3,n.maxMp);
    if(did){if(p.soundEnabled)SoundEngine.levelUp();setTimeout(()=>setLevelUp(true),300);setTimeout(()=>setLevelUp(false),2800);}
    n._finalXp=finalXp;n._streakMult=streakMult;n._isCrit=isCrit;
    return n;
  },[]);

  const applyEquipBonus=useCallback((xp,stat,equipment)=>{
    if(!equipment) return xp;
    let mult=1;
    Object.values(equipment).forEach(itemId=>{
      if(!itemId) return;
      const item=EQUIPMENT_ITEMS.find(i=>i.id===itemId);
      if(item&&item.xpStat===stat) mult+=item.xpPct/100;
    });
    return Math.round(xp*mult);
  },[]);

  /* doChainStep defined after doQuest (see below) */

  const doPenaltyQuest=useCallback(pq=>{
    setState(p=>{
      const n=apXp({...p},pq.xp,pq.stat,false);
      n.hp=Math.min(p.hp+pq.hpRestore,p.maxHp);
      n.penaltyQuests=(p.penaltyQuests||[]).filter(q=>q.id!==pq.id);
      return n;
    });
    setXpAnim(true);setTimeout(()=>setXpAnim(false),600);showT(`+${pq.hpRestore} HP recovered!`,"stat");
  },[apXp,showT]);

  const doDungeonStep=useCallback(stepIdx=>{
    setState(p=>{
      if(!p.weeklyDungeon) return p;
      const steps=[...p.weeklyDungeon.completedSteps];
      if(steps.includes(stepIdx)) return p;
      steps.push(stepIdx);
      const q=p.weeklyDungeon.quests[stepIdx];
      let n=apXp({...p},q.xp,q.stat,false);
      const cleared=steps.length>=p.weeklyDungeon.quests.length;
      n.weeklyDungeon={...p.weeklyDungeon,completedSteps:steps,cleared};
      n.records={...n.records,totalWorkouts:(n.records?.totalWorkouts||0)+1};
      return n;
    });
    setXpAnim(true);setTimeout(()=>setXpAnim(false),600);showT("Dungeon step complete!","xp");
  },[apXp,showT]);

  const claimDungeonReward=useCallback(()=>{
    setState(p=>{
      if(!p.weeklyDungeon?.cleared||p.weeklyDungeon?.rewardClaimed) return p;
      const n=apXp({...p},500,"STR",false);
      n.weeklyDungeon={...p.weeklyDungeon,rewardClaimed:true};
      const newAch=checkAchievements(n);
      if(newAch.length>0)n.achievements=[...(n.achievements||[]),...newAch];
      return n;
    });
    showT("+500 XP Dungeon Reward!","stat");
  },[apXp,showT]);

  const addCustomTimer=useCallback(t=>{
    setState(p=>({...p,timerSettings:[...p.timerSettings,{...t,id:`ct_${Date.now()}`,enabled:true}]}));
    setShowAddTimer(false);showT("Timer added!","stat");
  },[showT]);

  const delCustomTimer=useCallback(id=>{
    if(!id.startsWith("ct_")) return;
    setState(p=>({...p,timerSettings:p.timerSettings.filter(t=>t.id!==id)}));
  },[]);

  const equipItem=useCallback(itemId=>{
    const item=EQUIPMENT_ITEMS.find(i=>i.id===itemId);
    if(!item) return;
    setState(p=>{
      const eq={...p.equipment};
      if(eq[item.slot]===itemId) { eq[item.slot]=null; }
      else { eq[item.slot]=itemId; }
      return {...p,equipment:eq};
    });
  },[]);

  const startPomodoro=useCallback(minutes=>{
    setState(p=>({...p,pomodoro:{...p.pomodoro,active:true,seconds:minutes*60,total:minutes*60}}));
  },[]);

  const cancelPomodoro=useCallback(()=>{
    setState(p=>({...p,pomodoro:{...p.pomodoro,active:false,seconds:0}}));
  },[]);

  const setActiveTitleCb=useCallback(titleId=>{
    setState(p=>({...p,activeTitle:titleId}));
    setShowTitleSelect(false);
  },[]);

  const maybeRandom=useCallback(async(ns)=>{
    const cnt=(ns.questsSinceLastRandom||0)+1;
    const threshold=ns.questFreqMode==="aggressive"?2:3;
    const maxDaily=ns.questFreqMode==="aggressive"?10:6;
    if(cnt>=threshold && (ns.randomQuestsToday||0)<maxDaily && Math.random()<0.5){
      setTimeout(async()=>{setRandomPop(await generateAIQuest(ns));},1000);
      return {questsSinceLastRandom:0,randomQuestsToday:(ns.randomQuestsToday||0)+1};
    }
    return {questsSinceLastRandom:cnt};
  },[]);

  const doQuest=useCallback(async(q)=>{
    let ns;
    setState(p=>{
      if(p.completedToday.includes(q.id))return p;
      // Combo tracking
      const now=Date.now();
      const combo={...p.comboTracker};
      if(now-combo.lastTime<3600000){combo.count++;} else {combo.count=1;}
      combo.lastTime=now;
      const comboMult=combo.count>=3?1+(combo.count-2)*0.15:1;
      // Critical hit (10% chance)
      const isCrit=Math.random()<0.10;
      const eqBonusXp=applyEquipBonus(q.xp,q.stat,p.equipment);
      const baseXp=Math.round(eqBonusXp*comboMult);
      let n=apXp(p,baseXp,q.stat,isCrit);
      n.completedToday=[...p.completedToday,q.id];
      n.comboTracker=combo;
      // Records increment
      n.records={...(n.records||{}),totalQuestsCompleted:((n.records?.totalQuestsCompleted)||0)+1};
      // Daily log completed count
      const td=TDK();const dl={...(n.dailyLog||{})};
      if(dl[td])dl[td]={...dl[td],completed:(dl[td].completed||0)+1};
      n.dailyLog=dl;
      // Boss damage
      if(n.dailyBoss&&!n.dailyBoss.defeated) {
        const newHp=Math.max(n.dailyBoss.hp-baseXp,0);
        const defeated=newHp<=0;
        n.dailyBoss={...n.dailyBoss,hp:newHp,defeated};
        if(defeated){
          n=apXp(n,n.dailyBoss.xpReward,"STR",false);
          n.bossesDefeated=(p.bossesDefeated||0)+1;
          n._bossDefeated=true;
        }
      }
      // Check achievements
      const newAch=checkAchievements(n);
      if(newAch.length>0){n.achievements=[...(n.achievements||[]),...newAch];}
      n._newAch=newAch;n._combo=combo.count;
      ns=n; return n;
    });
    // Sound + animations
    if(ns?._isCrit){SoundEngine.criticalHit();setCritAnim(true);setTimeout(()=>setCritAnim(false),1200);}
    else if(state?.soundEnabled){SoundEngine.questComplete();}
    // Achievement popup
    if(ns?._newAch?.length>0){
      const achId=ns._newAch[0];const ach=ACHIEVEMENTS.find(a=>a.id===achId);
      if(ach){SoundEngine.achievementUnlock();setAchievementPop(ach);setTimeout(()=>setAchievementPop(null),4000);}
    }
    setXpAnim(true);setTimeout(()=>setXpAnim(false),600);
    const finalXp=ns?._finalXp||q.xp;const mult=ns?._streakMult||1;const combo=ns?._combo||0;
    let msg=`+${finalXp} XP • +1 ${q.stat}`;
    if(ns?._isCrit)msg=`CRITICAL HIT! ${msg}`;
    if(mult>1)msg+=` (×${mult} streak)`;
    if(combo>=3)msg+=` [${combo}x combo]`;
    showT(msg,ns?._isCrit?"warn":"xp");
    if(ns){const ru=await maybeRandom(ns);setState(p=>({...p,...ru}));}
  },[apXp,showT,maybeRandom,state?.soundEnabled]);

  const doChainStep=useCallback(async(chain,stepIdx)=>{
    const step=chain.steps[stepIdx];
    if(!step) return;
    await doQuest(step);
    setState(p=>{
      const cp={...p.chainProgress};
      const prev=cp[chain.id]||0;
      if(prev!==stepIdx) return p;
      cp[chain.id]=stepIdx+1;
      let n={...p,chainProgress:cp};
      if(cp[chain.id]>=chain.steps.length) {
        n=apXp(n,chain.bonusXp,"INT",false);
        swNotif(`🔗 Chain Complete!`,`${chain.name} +${chain.bonusXp} bonus XP`,"chain");
      }
      return n;
    });
  },[doQuest,apXp]);

  const doTimer=useCallback(t=>{
    setState(p=>{const n=apXp(p,t.xp,t.stat);n.timerCompletionsToday=(p.timerCompletionsToday||0)+1;return n;});
    setXpAnim(true);setTimeout(()=>setXpAnim(false),600);showT(`+${t.xp} XP • +1 ${t.stat}`);setTimerPop(null);
  },[apXp,showT]);

  const acceptRQ=useCallback(()=>{
    if(!randomPop)return;
    setState(p=>{
      const n={...p,
        customQuests:[...p.customQuests,{id:randomPop.id,name:randomPop.name,desc:randomPop.desc,xp:randomPop.xp,stat:randomPop.stat,icon:randomPop.icon,isRandom:true}],
        recentRandomQuests:[...(p.recentRandomQuests||[]),randomPop.name].slice(-30),
        achievementCtx:{...p.achievementCtx,randomAccepted:(p.achievementCtx?.randomAccepted||0)+1},
      };
      const newAch=checkAchievements(n);
      if(newAch.length>0)n.achievements=[...(n.achievements||[]),...newAch];
      return n;
    });
    showT("System Quest accepted!","stat");setRandomPop(null);
  },[randomPop,showT]);

  const declineRQ=useCallback(()=>{
    if(!randomPop)return;
    setState(p=>({...p,recentRandomQuests:[...(p.recentRandomQuests||[]),randomPop.name].slice(-30)}));
    setRandomPop(null);
  },[randomPop]);

  const rerollRQ=useCallback(async()=>{
    if(rerolling||!state||state.mp<10)return;setRerolling(true);
    setState(p=>({...p,mp:Math.max(p.mp-10,0)}));
    setRandomPop(await generateAIQuest(state));setRerolling(false);
  },[rerolling,state]);

  const summonQuest=useCallback(async()=>{
    if(!state||state.summonUsedToday)return;
    setState(p=>({...p,summonUsedToday:true,randomQuestsToday:(p.randomQuestsToday||0)+1}));
    const q=await generateAIQuest(state);
    setRandomPop(q);
  },[state]);

/* ═══════════════════ SHARE CARD MODAL ═══════════════════ */
function ShareCardModal({state,onClose}) {
  const canRef=useRef(null);
  useEffect(()=>{
    const canvas=canRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const W=480,H=320;
    canvas.width=W;canvas.height=H;
    // Background
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,"#0a0a12");grad.addColorStop(1,"#111327");
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Border
    ctx.strokeStyle="rgba(99,102,241,.5)";ctx.lineWidth=2;ctx.strokeRect(1,1,W-2,H-2);
    // Title
    ctx.fillStyle="#818cf8";ctx.font="bold 12px 'Arial'";ctx.textAlign="center";
    ctx.fillText("SOLO LEVELING LIFE",W/2,30);
    // Level
    ctx.fillStyle="#e2e8f0";ctx.font="bold 48px 'Arial'";
    ctx.fillText(`LV.${state.level}`,W/2,90);
    // Title text
    ctx.fillStyle="#a5b4fc";ctx.font="16px 'Arial'";
    ctx.fillText(state.title,W/2,115);
    // Stats
    const stats=Object.entries(state.stats);
    const colors={STR:"#ef4444",VIT:"#22c55e",AGI:"#3b82f6",INT:"#a855f7",CHA:"#f59e0b"};
    stats.forEach(([k,v],i)=>{
      const x=40+i*(W-80)/4.5,y=160;
      ctx.fillStyle=colors[k]||"#818cf8";ctx.font="bold 22px 'Arial'";ctx.textAlign="center";
      ctx.fillText(v,x,y);
      ctx.fillStyle="#64748b";ctx.font="11px 'Arial'";
      ctx.fillText(k,x,y+18);
    });
    // Bar for XP
    ctx.fillStyle="rgba(255,255,255,.08)";ctx.fillRect(40,190,W-80,12);
    const pct=(state.xp/(LEVEL_XP[Math.min(state.level,LEVEL_XP.length-1)]||1));
    ctx.fillStyle="#6366f1";ctx.fillRect(40,190,Math.min((W-80)*pct,W-80),12);
    // Bottom line
    ctx.fillStyle="#475569";ctx.font="12px 'Arial'";ctx.textAlign="center";
    ctx.fillText(`Streak: ${state.streak}d  •  Total XP: ${state.totalXp.toLocaleString()}  •  HP: ${state.hp}/${state.maxHp}`,W/2,240);
    ctx.fillStyle="#374151";ctx.font="10px 'Arial'";
    ctx.fillText("Solo Leveling Life PWA",W/2,270);
  },[]);
  const download=()=>{
    const a=document.createElement("a");a.download="sl-life-card.png";
    a.href=canRef.current.toDataURL("image/png");a.click();
  };
  return React.createElement("div",{style:ov,onClick:onClose},
    React.createElement("div",{style:{background:"#0a0a12",border:"1px solid rgba(168,85,247,.3)",borderRadius:16,padding:"16px",animation:"popIn .3s ease",maxWidth:520},onClick:e=>e.stopPropagation()},
      React.createElement("p",{style:{fontFamily:"'Cinzel',serif",fontSize:16,color:"#c7d2fe",marginBottom:12,textAlign:"center"}},"📤 Share Card"),
      React.createElement("canvas",{ref:canRef,style:{borderRadius:8,width:"100%",maxWidth:480,display:"block"}}),
      React.createElement("div",{style:{display:"flex",gap:8,marginTop:12}},
        React.createElement("button",{onClick:download,style:{...bpS,flex:1,fontSize:14}},"⬇ Download PNG"),
        React.createElement("button",{onClick:onClose,style:{...bgS,flex:1}},"Close"),
      ),
    )
  );
}
